name: Secure DevOps Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run App
      run: |
        cd app
        pip install -r requirements.txt
        python init_db.py
        python app.py & sleep 5
        curl http://127.0.0.1:5000

  sast:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3
    - run: pip install semgrep
    - run: semgrep --config=auto app/ --error

  secret-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3
    - run: |
        docker run --rm -v ${{ github.workspace }}:/repo ghcr.io/trufflesecurity/trufflehog:latest \
        filesystem /repo --fail

  dependency-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: pip install pip-audit
    - run: pip-audit -r app/requirements.txt --strict

  deploy:
    runs-on: ubuntu-latest
    needs: [build, sast, secret-scan, dependency-scan]
    if: success()
    environment: production

    steps:
    - run: echo "Deploying..."