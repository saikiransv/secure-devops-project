name: Basic CI Pipeline (No Security)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          cd app
          pip install -r requirements.txt

      - name: Run Application
        run: |
          cd app
          python init_db.py || true
          python app.py & sleep 5

      - name: Test Application
        run: |
          curl http://127.0.0.1:5000

      - name: Deploy (No Security Checks)
        run: |
          echo "🚀 Deploying application without any security validation..."