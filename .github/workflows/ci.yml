name: Secure DevOps Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run Vulnerable App
      run: |
        cd vulnerable-app
        pip install -r requirements.txt
        python init_db.py
        python app.py & sleep 5
        curl http://127.0.0.1:5000

    - name: Run Secure App
      run: |
        cd secure-app
        pip install -r requirements.txt
        python init_db.py
        python app.py & sleep 5
        curl http://127.0.0.1:5000

  deploy:
    needs: build
    if: success()
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Deploy Step
      run: echo "Deploying to production..."