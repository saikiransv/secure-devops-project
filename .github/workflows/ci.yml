name: Secure DevOps Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run App
      run: |
        cd app
        pip install -r requirements.txt
        python init_db.py
        python app.py & sleep 5
        curl http://127.0.0.1:5000

  deploy:
    needs: build
    if: success()
    runs-on: ubuntu-latest
    environment: production

    steps:
    - run: echo "Deploying..."