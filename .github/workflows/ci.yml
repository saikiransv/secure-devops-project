name: Secure DevOps Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run App
      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
      run: |
        cd app
        pip install -r requirements.txt
        python init_db.py || true
        python app.py & sleep 5
        curl http://127.0.0.1:5000

  sast:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3

    - name: Install Semgrep
      run: pip install semgrep

    - name: Run SAST Scan (STRICT & CONTROLLED)
      run: |
        semgrep --config=p/owasp-top-ten \
                --config=p/python \
                --error \
                --exclude tests \
                app/

  secret-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3

    - name: Run Secret Scan
      run: |
        docker run --rm \
        -v ${{ github.workspace }}/app:/repo \
        ghcr.io/trufflesecurity/trufflehog:latest \
        filesystem /repo --fail

  dependency-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install pip-audit
      run: pip install pip-audit

    - name: Install Dependencies
      run: |
        cd app
        pip install -r requirements.txt

    - name: Run Dependency Scan
      run: pip-audit -r app/requirements.txt --strict

  dast:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'

    steps:
    - uses: actions/checkout@v3

    - name: Run ZAP Scan
      uses: zaproxy/action-baseline@v0.11.0
      with:
        target: 'https://your-ngrok-url.ngrok-free.dev'
        fail_action: false

  deploy:
    runs-on: ubuntu-latest
    needs: [build, sast, secret-scan, dependency-scan]
    if: success()
    environment: production   # ✅ ADDED (for approval)

    steps:
    - name: Deploy
      run: echo "Deploying..."