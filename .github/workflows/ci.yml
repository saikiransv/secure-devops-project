name: Secure DevOps Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run App
      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY }}   # ✅ FIX: Inject secret
      run: |
        cd app
        pip install -r requirements.txt
        python init_db.py || true
        python app.py & sleep 5
        curl http://127.0.0.1:5000

  sast:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3

    - name: Install Semgrep
      run: pip install semgrep

    - name: Run SAST Scan
      run: semgrep --config=auto app/ --error

  secret-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3

    - name: Run Secret Scan (STRICT MODE)
      run: |
        docker run --rm \
        -v ${{ github.workspace }}:/repo \
        ghcr.io/trufflesecurity/trufflehog:latest \
        filesystem /repo \
        --fail \
        --exclude-paths=/repo/.git   # ✅ FIX: Avoid false positives

  dependency-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install pip-audit
      run: pip install pip-audit

    - name: Install App Dependencies
      run: |
        cd app
        pip install -r requirements.txt

    - name: Run Dependency Scan
      run: pip-audit -r app/requirements.txt --strict

  # 🔥 DAST (MANUAL ONLY)
  dast:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'

    steps:
    - uses: actions/checkout@v3

    - name: Run ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.11.0
      with:
        target: 'https://sandee-nonpermitted-uncontemningly.ngrok-free.dev'
        fail_action: false
        allow_issue_writing: true

    - name: Upload ZAP Report
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: report_html.html

  deploy:
    runs-on: ubuntu-latest
    needs: [build, sast, secret-scan, dependency-scan]
    if: success()
    environment: production

    steps:
    - name: Deploy Step
      run: echo "Deploying..."